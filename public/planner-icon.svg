<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="ringTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="ringBottom" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="50%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <linearGradient id="mLeft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="mRight" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="mCenter" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#facc15" />
    </linearGradient>
    <radialGradient id="bgInner" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f5e8ff" />
    </radialGradient>
  </defs>

  <!-- outer ring with rainbow gradient (split top + bottom) -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="url(#ringTop)" stroke-width="6" stroke-linecap="round"
          stroke-dasharray="180 180" transform="rotate(-90 50 50)" />
  <circle cx="50" cy="50" r="46" fill="none" stroke="url(#ringBottom)" stroke-width="6" stroke-linecap="round"
          stroke-dasharray="120 240" stroke-dashoffset="-180" transform="rotate(-90 50 50)" />

  <!-- inner background disc -->
  <circle cx="50" cy="50" r="40" fill="url(#bgInner)" />

  <!-- M letter: built from three rounded strokes -->
  <!-- Left leg -->
  <path d="M 30 70 L 30 35 Q 30 28 36.5 28 Q 43 28 43 35 L 43 55"
        fill="none" stroke="url(#mLeft)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Right leg -->
  <path d="M 70 70 L 70 35 Q 70 28 63.5 28 Q 57 28 57 35 L 57 55"
        fill="none" stroke="url(#mRight)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Center V -->
  <path d="M 38 32 L 50 60 L 62 32"
        fill="none" stroke="url(#mCenter)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" />

  <!-- chat bubble dot -->
  <circle cx="63" cy="86" r="4.5" fill="#ec4899" />
</svg>
